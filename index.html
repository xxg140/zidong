<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AutoDialer - 智能自动拨号系统</title>
  <link rel="stylesheet" href="style.css?v=28">
</head>
<body>
  <header class="app-header">
    <div class="header-left"><span class="logo">📞</span><h1>AutoDialer</h1></div>
    <div class="header-right"><button id="settingsBtn" class="icon-btn" title="设置">⚙️</button></div>
  </header>

  <main class="main-content">
    <nav class="sidebar">
      <button class="nav-item" data-tab="dialpad"><span class="nav-icon">🔢</span><span class="nav-label">拨号盘</span></button>
      <button class="nav-item active" data-tab="tasks"><span class="nav-icon">📋</span><span class="nav-label">任务</span></button>
      <button class="nav-item" data-tab="history"><span class="nav-icon">📜</span><span class="nav-label">记录</span></button>
      <button class="nav-item" data-tab="stats"><span class="nav-icon">📊</span><span class="nav-label">统计</span></button>
    </nav>

    <section class="content-area">
      <!-- 联系人页面 -->
      <div id="contactsPage" class="page">
        <div class="page-header">
          <h2>联系人管理</h2>
          <div class="header-actions">
            <button class="btn btn-primary" id="addContactBtn">+ 新建</button>
            <button class="btn btn-secondary" id="importContactsBtn">📥 导入</button>
            <button class="btn btn-secondary" id="exportContactsBtn">📤 导出</button>
          </div>
        </div>
        <div class="search-bar">
          <input type="text" id="searchContacts" placeholder="搜索姓名或电话...">
          <select id="filterGroup"><option value="">全部分组</option></select>
        </div>
        <div class="contact-list" id="contactList"></div>
        <div class="pagination" id="contactsPagination"></div>
      </div>

      <!-- 拨号盘页面 -->
      <div id="dialpadPage" class="page">
        <div class="page-header"><h2>手动拨号</h2></div>
        <div class="dialpad-container">
          <div class="dial-display">
            <input type="tel" id="dialNumber" placeholder="输入号码" readonly>
            <button class="dial-clear" id="dialClear">⌫</button>
          </div>
          <div class="dialpad-grid">
            <button class="dial-btn" data-digit="1">1</button>
            <button class="dial-btn" data-digit="2">2<span>ABC</span></button>
            <button class="dial-btn" data-digit="3">3<span>DEF</span></button>
            <button class="dial-btn" data-digit="4">4<span>GHI</span></button>
            <button class="dial-btn" data-digit="5">5<span>JKL</span></button>
            <button class="dial-btn" data-digit="6">6<span>MNO</span></button>
            <button class="dial-btn" data-digit="7">7<span>PQRS</span></button>
            <button class="dial-btn" data-digit="8">8<span>TUV</span></button>
            <button class="dial-btn" data-digit="9">9<span>WXYZ</span></button>
            <button class="dial-btn" data-digit="*">*</button>
            <button class="dial-btn" data-digit="0">0<span>+</span></button>
            <button class="dial-btn" data-digit="#">#</button>
          </div>
          <div class="dialpad-container-actions">
            <button class="btn btn-call" id="makeCallBtn">📱 拨打</button>
          </div>
        </div>
      </div>

      <!-- 任务页面 -->
      <div id="tasksPage" class="page active">
        <div class="page-header">
          <h2>自动拨号任务</h2>
          <div class="header-actions">
            <button class="btn btn-secondary" id="importTaskBtn">📥 导入任务</button>
            <button class="btn btn-primary" id="addTaskBtn">+ 手动添加</button>
          </div>
        </div>
        <div class="task-overview">
          <div class="stat-card"><div class="stat-icon">📋</div><div class="stat-info"><div class="stat-value" id="totalTasks">0</div><div class="stat-label">总任务</div></div></div>
          <div class="stat-card"><div class="stat-icon">⏳</div><div class="stat-info"><div class="stat-value" id="pendingTasks">0</div><div class="stat-label">待执行</div></div></div>
          <div class="stat-card"><div class="stat-icon">✅</div><div class="stat-info"><div class="stat-value" id="completedTasks">0</div><div class="stat-label">已完成</div></div></div>
          <div class="stat-card"><div class="stat-icon">🔄</div><div class="stat-info"><div class="stat-value" id="runningTasks">0</div><div class="stat-label">执行中</div></div></div>
        </div>
        <div class="task-list" id="taskList"></div>
      </div>

      <!-- 通话记录页面 -->
      <div id="historyPage" class="page">
        <div class="page-header">
          <h2>通话记录</h2>
          <div class="header-actions">
            <button class="btn btn-secondary" id="exportHistoryBtn">📤 导出</button>
            <button class="btn btn-danger" id="clearHistoryBtn">🗑️ 清空</button>
          </div>
        </div>
        <div class="filter-bar">
          <select id="historyStatus"><option value="">全部状态</option><option value="completed">已接通</option><option value="missed">未接通</option><option value="failed">拨打失败</option></select>
        </div>
        <div class="history-date-tabs">
          <button class="date-tab active" data-range="today">今天</button>
          <button class="date-tab" data-range="yesterday">昨天</button>
          <button class="date-tab" data-range="thisWeek">本周</button>
          <button class="date-tab" data-range="lastWeek">上周</button>
          <button class="date-tab" data-range="thisMonth">本月</button>
          <button class="date-tab" data-range="lastMonth">上月</button>
          <button class="date-tab date-tab-custom" id="historyCustomDateBtn" data-range="custom">📅 自定义</button>
        </div>
        <div id="historyCustomDateRange" style="display:none;padding:0 16px 8px;">
          <div style="display:flex;gap:8px;align-items:center;">
            <input type="date" id="historyDateFrom" style="flex:1;padding:8px;border:1px solid var(--light-gray);border-radius:var(--radius);font-size:13px;">
            <span style="color:#8E8E93;">至</span>
            <input type="date" id="historyDateTo" style="flex:1;padding:8px;border:1px solid var(--light-gray);border-radius:var(--radius);font-size:13px;">
            <button class="btn btn-primary" id="applyCustomDateBtn" style="padding:8px 12px;font-size:13px;white-space:nowrap;">确定</button>
          </div>
        </div>
        <div class="history-list" id="historyList"></div>
      </div>

      <!-- 统计页面 -->
      <div id="statsPage" class="page">
        <div class="page-header">
          <h2>数据统计</h2>
          <div class="header-actions">
            <select id="statsPeriod"><option value="7">最近7天</option><option value="30" selected>最近30天</option><option value="90">最近90天</option></select>
            <button class="btn btn-secondary" id="exportStatsBtn">📊 导出报告</button>
          </div>
        </div>
        <div class="stats-overview">
          <div class="big-stat"><div class="big-stat-value" id="totalCalls">0</div><div class="big-stat-label">总拨打量</div></div>
          <div class="big-stat"><div class="big-stat-value" id="avgConnectRate">0%</div><div class="big-stat-label">平均接通率</div></div>
          <div class="big-stat"><div class="big-stat-value" id="avgDuration">0秒</div><div class="big-stat-label">平均通话时长</div></div>
        </div>
        <div class="charts-container">
          <div class="chart-card"><h3>每日拨打电话趋势</h3><div class="chart" id="dailyChart"></div></div>
          <div class="chart-card"><h3>接通率分布</h3><div class="chart" id="connectRateChart"></div></div>
        </div>
        <div class="leaderboard"><h3>TOP 联系人（按通话次数）</h3><div id="topContactsList"></div></div>
      </div>
    </section>
  </main>

  <!-- 新建/编辑联系人 -->
  <div class="modal" id="contactModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="contactModalTitle">新建联系人</h3>
        <button class="modal-close" data-modal="contactModal">×</button>
      </div>
      <form id="contactForm">
        <input type="hidden" id="contactId">
        <div class="form-group"><label>姓名 <span class="required">*</span></label><input type="text" id="contactName" required placeholder="输入联系人姓名"></div>
        <div class="form-group"><label>电话 <span class="required">*</span></label><input type="tel" id="contactPhone" required placeholder="输入电话号码"></div>
        <div class="form-group"><label>分组</label><select id="contactGroup"><option value="">无分组</option></select></div>
        <div id="customFieldsContainer"></div>
        <div class="form-group"><label>备注</label><textarea id="contactNote" rows="3" placeholder="添加备注..."></textarea></div>
        <div class="form-actions">
          <button type="button" class="btn btn-secondary" data-modal="contactModal">取消</button>
          <button type="submit" class="btn btn-primary">保存</button>
        </div>
      </form>
    </div>
  </div>

  <!-- 手动添加号码弹窗 -->
  <div class="modal" id="manualAddModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>手动添加号码</h3>
        <button class="modal-close" data-modal="manualAddModal">×</button>
      </div>
      <div style="padding:16px 20px;">
        <div style="font-size:13px;color:#8E8E93;margin-bottom:12px;">每行一个号码，格式：姓名,电话 或直接电话号码</div>
        <textarea id="manualAddInput" rows="8" placeholder="张三,13800138001&#10;李四,13900139002&#10;13700137003" style="width:100%;padding:12px;border:1px solid var(--light-gray);border-radius:var(--radius);font-size:14px;resize:vertical;font-family:monospace;background:var(--bg-color);"></textarea>
      </div>
      <div style="padding:0 20px 20px;">
        <div class="form-group">
          <label>任务名称 <span class="required">*</span></label>
          <input type="text" id="manualTaskName" placeholder="例如：2026年4月营销外呼">
        </div>
        <div class="form-group">
          <label>拨号模式</label>
          <select id="manualTaskMode">
            <option value="auto">自动模式</option>
            <option value="manual" selected>手动确认模式</option>
          </select>
        </div>
      </div>
      <div class="form-actions">
        <button type="button" class="btn btn-secondary" data-modal="manualAddModal">取消</button>
        <button class="btn btn-primary" id="confirmManualAddBtn">创建任务</button>
      </div>
    </div>
  </div>

  <!-- 导入模态框 -->
  <div class="modal" id="importModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>导入数据</h3>
        <button class="modal-close" data-modal="importModal">×</button>
      </div>
      <!-- 模板+文件选择 -->
      <div class="import-section">
        <div style="padding:16px 20px 0;display:flex;justify-content:space-between;align-items:center;">
          <button class="btn btn-secondary" id="downloadTemplateBtn">📥 下载导入模板</button>
          <label class="btn btn-primary" style="cursor:pointer;">选择文件<input type="file" id="importFileInput" accept=".csv,.txt,.xlsx,.xls" hidden></label>
        </div>
        <div class="import-drop-zone" id="importDropZone" style="margin:16px 20px;">
          <div class="import-icon">📁</div>
          <p>将文件拖到此处，或点击「选择文件」</p>
          <p class="import-hint">支持 CSV / TXT</p>
        </div>
        <div id="importFileName" style="text-align:center;font-size:13px;color:#007AFF;font-weight:500;padding:0 20px;"></div>
      </div>

      <!-- 导入任务选项 -->
      <div id="importTaskOptions" class="import-section" style="padding:0 20px 20px;display:block;">
        <div class="form-group" style="margin-top:8px;">
          <label>任务名称 <span class="required">*</span></label>
          <input type="text" id="importTaskName" placeholder="例如：2026年4月营销外呼">
        </div>
        <div class="form-group">
          <label>拨号模式</label>
          <select id="importTaskMode">
            <option value="auto">自动模式</option>
            <option value="manual" selected>手动确认模式 ⭐</option>
          </select>
        </div>
        <div class="form-group">
          <label><input type="checkbox" id="importTaskDedup" checked> 去除重复号码</label>
        </div>
        <div id="importTaskPreviewArea" style="display:none;margin-bottom:12px;">
          <div style="font-size:13px;color:#8E8E93;margin-bottom:8px;">预览：共 <strong id="importTaskCount">0</strong> 个号码</div>
          <div id="importTaskPreviewList" style="background:#F2F2F7;border-radius:8px;padding:8px;font-size:12px;max-height:100px;overflow-y:auto;color:#3C3C43;"></div>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-secondary" data-modal="importModal">取消</button>
          <button class="btn btn-primary" id="confirmImportTaskBtn">创建任务</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 任务详情弹窗 -->
  <div class="modal" id="taskDetailModal">
    <div class="modal-content modal-large" style="max-height:85vh;">
      <div class="modal-header">
        <h3>📋 <span id="taskDetailTitle"></span></h3>
        <button class="modal-close" id="closeTaskDetailBtn">×</button>
      </div>
      <!-- Tab 切换 -->
      <div class="detail-tabs">
        <button class="detail-tab active" data-detail-tab="pending" id="detailTabPending">○ 待拨打 <span id="detailPendingCount">0</span></button>
        <button class="detail-tab" data-detail-tab="called" id="detailTabCalled">📞 已拨打 <span id="detailCalledCount">0</span></button>
      </div>
      <!-- 操作按钮 -->
      <div class="task-detail-actions">
        <button class="btn btn-secondary" id="reAddAllBtn">🔄 重置全部</button>
        <button class="btn btn-warning" id="createFailedTaskBtn">📋 未接通生成</button>
      </div>
      <div id="taskDetailList" style="padding:16px;"></div>
    </div>
  </div>

  <!-- 新建任务 -->
  <div class="modal" id="taskModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="taskModalTitle">新建拨号任务</h3>
        <button class="modal-close" data-modal="taskModal">×</button>
      </div>
      <form id="taskForm">
        <div class="form-group"><label>任务名称 <span class="required">*</span></label><input type="text" id="taskName" required placeholder="给任务起个名字"></div>
        <div class="form-group">
          <label>选择联系人 <span class="required">*</span></label>
          <div class="contact-selector">
            <div class="selected-contacts" id="selectedContacts"></div>
            <button type="button" class="btn btn-secondary" id="selectContactsBtn">+ 选择联系人</button>
          </div>
        </div>
        <div class="form-group">
          <label>拨号模式</label>
          <select id="taskMode">
            <option value="auto">自动模式（自动拨打下一个）</option>
            <option value="manual" selected>手动确认模式（打完点「下一个」再拨）⭐</option>
          </select>
        </div>
        <div class="form-group">
          <label>执行顺序</label>
          <select id="taskOrderMode">
            <option value="sequential">按顺序拨打</option>
            <option value="random">随机顺序</option>
          </select>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-secondary" data-modal="taskModal">取消</button>
          <button type="submit" class="btn btn-primary">创建任务</button>
        </div>
      </form>
    </div>
  </div>

  <!-- 联系人选择器 -->
  <div class="modal" id="contactPickerModal">
    <div class="modal-content modal-large">
      <div class="modal-header">
        <h3>选择联系人</h3>
        <button class="modal-close" data-modal="contactPickerModal">×</button>
      </div>
      <div class="search-bar" style="padding:0 16px;">
        <input type="text" id="pickerSearch" placeholder="搜索姓名或电话...">
      </div>
      <div class="picker-list" id="pickerContactList"></div>
      <div class="picker-footer">
        <span id="pickerCount">已选 0 个</span>
        <div style="display:flex;gap:8px;">
          <button type="button" class="btn btn-secondary" data-modal="contactPickerModal">取消</button>
          <button type="button" class="btn btn-primary" id="confirmSelectionBtn">确认</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 设置 -->
  <div class="modal" id="settingsModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>系统设置</h3>
        <button class="modal-close" data-modal="settingsModal">×</button>
      </div>
      <form id="settingsForm">
        <div class="settings-divider"></div>
        <div class="settings-section-title">📋 分组管理</div>
        <div class="form-group">
          <label>联系人分组（每行一个）</label>
          <textarea id="settingGroups" rows="4" placeholder="VIP客户&#10;热线索&#10;冷线索&#10;待跟进"></textarea>
          <small>每行一个分组，修改后保存</small>
        </div>
        <div class="settings-divider"></div>
        <div class="settings-section-title">🗂️ 自定义字段</div>
        <div id="customFieldSettings"></div>
        <button type="button" class="btn btn-secondary" id="addCustomFieldBtn" style="margin-bottom:12px;width:100%;font-size:13px;">+ 添加自定义字段</button>
        <div class="settings-divider"></div>
        <div class="form-group">
          <label>数据存储</label>
          <select id="settingStorage">
            <option value="local">本地存储（浏览器内）</option>
            <option value="cloud" disabled>云端同步（即将推出）</option>
          </select>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-secondary" data-modal="settingsModal">取消</button>
          <button type="submit" class="btn btn-primary">保存设置</button>
        </div>
      </form>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="app.js?v=26"></script>
</body>
</html>
