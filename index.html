<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>拨号助手</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 顶部 -->
  <header class="header">
    <div class="header-title">📞 拨号助手</div>
    <div class="header-actions">
      <button class="btn btn-secondary" id="importBtn">📥 导入</button>
    </div>
  </header>

  <!-- 今日统计 -->
  <div class="stats-bar">
    <div class="stat-item">
      <div class="stat-num" id="todayCount">0</div>
      <div class="stat-label">今日拨打</div>
    </div>
  </div>

  <!-- 主内容：任务列表 -->
  <main class="main" id="taskList"></main>

  <!-- 底部添加按钮 -->
  <div class="bottom-bar">
    <button class="btn btn-primary btn-large" id="addTaskBtn">+ 新建任务</button>
  </div>

  <!-- ========== 导入弹窗 ========== -->
  <div class="modal" id="importModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>导入号码</h3>
        <button class="modal-close" onclick="closeModal('importModal')">×</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>任务名称</label>
          <input type="text" id="importTaskName" placeholder="例如：4月外呼">
        </div>
        <div class="form-group">
          <label>选择文件</label>
          <div class="file-input-wrap">
            <button class="btn btn-secondary" id="downloadTplBtn">📥 下载模板</button>
            <label class="btn btn-outline">
              选择文件
              <input type="file" id="fileInput" accept=".csv,.txt,.xlsx,.xls" hidden>
            </label>
          </div>
          <div class="file-name" id="fileName"></div>
        </div>
        <div class="form-group">
          <label><input type="checkbox" id="dedupCheck" checked> 自动去除重复号码</label>
        </div>
        <div class="preview-area" id="previewArea" style="display:none;">
          <div class="preview-label">预览：共 <strong id="previewCount">0</strong> 个号码</div>
          <div class="preview-list" id="previewList"></div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('importModal')">取消</button>
        <button class="btn btn-primary" id="confirmImportBtn" disabled onclick="console.log('[ONCLICK] confirmImportBtn clicked'); confirmImport();">创建任务</button>
      </div>
    </div>
  </div>

  <!-- ========== 新建任务弹窗 ========== -->
  <div class="modal" id="addModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>新建任务</h3>
        <button class="modal-close" onclick="closeModal('addModal')">×</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>任务名称 <span class="required">*</span></label>
          <input type="text" id="newTaskName" placeholder="例如：4月外呼">
        </div>
        <div class="form-group">
          <label>号码（每行一个）<span class="required">*</span></label>
          <textarea id="newTaskPhones" rows="6" placeholder="张三,13800138001&#10;李四,13900139002&#10;13700137003"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('addModal')">取消</button>
        <button class="btn btn-primary" id="confirmAddBtn">创建</button>
      </div>
    </div>
  </div>

  <!-- ========== 任务详情弹窗 ========== -->
  <div class="modal" id="detailModal">
    <div class="modal-content modal-large">
      <div class="modal-header">
        <h3 id="detailTitle">任务详情</h3>
        <button class="modal-close" onclick="closeModal('detailModal')">×</button>
      </div>
      <!-- Tab -->
      <div class="detail-tabs">
        <button class="detail-tab active" data-tab="pending" onclick="switchDetailTab('pending')">○ 待拨打 <span id="pendingCount">0</span></button>
        <button class="detail-tab" data-tab="called" onclick="switchDetailTab('called')">📞 已拨打 <span id="calledCount">0</span></button>
      </div>
      <!-- 列表 -->
      <div class="detail-list" id="detailList"></div>
      <!-- 底部操作 -->
      <div class="detail-footer">
        <button class="btn btn-secondary" id="resetAllBtn">🔄 重置全部</button>
        <button class="btn btn-warning" id="exportCalledBtn">📋 导出已拨打</button>
      </div>
    </div>
  </div>

  <!-- ========== 拨打结果弹窗 ========== -->
  <div class="modal" id="resultModal">
    <div class="modal-content modal-small">
      <div class="modal-header">
        <h3>通话结果</h3>
      </div>
      <div class="modal-body" style="text-align:center;padding:24px 20px;">
        <div class="result-phone" id="resultPhone">-</div>
        <div class="result-hint">请选择本次通话结果</div>
      </div>
      <div class="result-btns">
        <button class="btn btn-success btn-large" style="flex:1;" onclick="markResult('connected')">✅ 接通了</button>
        <button class="btn btn-danger btn-large" style="flex:1;" onclick="markResult('missed')">❌ 未接通</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="app.js"></script>
</body>
</html>
